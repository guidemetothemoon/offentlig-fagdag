    - org: Bekk
      track: Lyntale
      title: Teamet ditt lager verdiløs funksjonalitet!
      speaker: Gunn-Elin Åsgren, Politiets IT-enhet og Lars Andreas Tveiten van Woensel Kooy
      description: |-
        Altfor mange team i offentlig sektor vet nøyaktig hva de har levert, men langt færre kan svare tydelig på hvilken verdi det faktisk skaper for brukerne og samfunnet. Når vi spør om effekt, får vi ofte magefølelse i retur.
        Lars Andreas Tveiten van Woensel Kooy fra Bekk og Gunn-Elin Åsgren fra Politiets IT-enhet deler erfaringer fra team som har gått fra løsningsfokus til verdifokus – og gir deg konkrete grep for å bevege deg fra antakelser og magefølelse til målbare resultater.
  - time: 16:00–16:10
