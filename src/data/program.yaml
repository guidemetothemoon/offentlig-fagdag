    - org: Skatteetaten
      title: Gjenoppretting av data etter katastrofale hendelser
      speaker: Leila Langø og Ole Dag Svebak
      description: |-
        Leila Langø, Gjenopprettingsleder i Skatteetaten, og Ole Dag Svebak, fagansvarlig for Gjenoppretting og IKT beredskap i Skatteetaten, forteller om hvorfor gjenoppretting er kritisk for å oppfylle samfunnsoppdraget når, - ikke hvis, katastrofen inntreffer. Du får en introduksjon til hva gjenoppretting er og hvordan vi jobber for å forbedre gjenopprettingsevnen i Skatteetaten.
  - time: 09:50
    event: Pause
  - time: 10:00–10:30
    duration: 30 min
    talks:
    - org: NRK
      title: Leveransekjedesikkerhet for frontendere
      speaker: Knut Haugen
      description: |-
        Leveransekjedesikkerhet kom for alvor på agendaen med Shai-hulud 1.0 og 2.0, og det var jo heller ikke første gang. Økosystemet rundt node.js og javascript er kanskje særlig utsatt. Hvordan kan vi ta enkle grep i vårt eget oppsett i byggepipelines og pakkehåndterere for å motvirke dette?
  - time: '10:30'
    event: Pause
  - time: 10:40–11:10
    duration: 30 min
    talks:
    - org: Digdir
      title: eIDAS2 og vegen mot eit europeisk økosystem for digitale identitetslommebøker
      speaker: Aamund Bremer
      description: |-
        Med eIDAS2-forordninga blir det lagt til rette for etableringa av eit felles europeisk økosystem for digitale identitetslommebøker – EU Digital Identity Wallet. Dette representerer eit viktig steg frå nasjonale eID-løysingar til eit samanhengande, grensekryssande system for identitet, legitimasjon og deling av verifiserte opplysningar i heile Europa.

        I dette føredraget får du ei innføring i kva digitale identitetslommebøker er, korleis dei fungerer, og kva dei kan brukast til – frå trygg innlogging og elektronisk signering til deling av digitale bevis som førarkort, vitnemål og verksemdsattestar. Vi ser på korleis lommebøkene gir brukaren større kontroll over eigne data gjennom selektiv deling og nye tillitsmodellar.

        Deretter tek vi ein kikk på eIDAS2 og rammeverket for EU Digital Identity Wallet-økosystemet: krav til medlemslanda, rolla til offentlege og private aktørar, deira samvirke og tillitsinfrastruktur. Kva betyr dette i praksis for verksemder, teknologileverandørar og offentleg sektor?

        Til slutt oppdaterer vi på status i Noreg: nasjonal sandkasse, pilotering og førebuingar til integrasjon mot europeisk infrastruktur. Kva bør du som utviklar eller løysingsarkitekt førebu deg på no?
  - time: '11:10'
    event: Pause
  - time: 11:20–11:50
    duration: 30 min
    talks:
    - org: Norsk helsenett
      title: La oss bygge et datasenter
      speaker: Håvard Elnan
      description: |-
        Jeg tar med noe hardware så setter vi opp en infrastrukturplattform fra bunnen. Vi viser hvordan Norsk helsenett tenker på autonome datasenter, definert av software og automatisert.
  - time: '11:50'
    event: Lunsj
  - time: 13:00–13:30
    duration: 30 min
    talks:
    - org: Oslo kommune
      title: Trusselmodellering
      speaker: Report from the trenches - Rune Schumann, Digitaliseringsetaten
      description: |-
        Trusselmodellering er en svært nyttig øvelse og gir god innsikt i tekniske sårbarheter i applikasjoner og verdikjeder. Jeg har lang erfaring som senior sikkerhetsrådgiver å gjennomføre trusselmodelleringer på godt og vondt.
        Trusselmodellering gjennomføres ofte på en måte som ikke øker selvtilliten til deltagerne. Noe av årsaken er at man blir snødd ned av kompleksitet og en grenseløs mengde gjøremål. Man mister selve rosinen i pølsa: avdekke de største sårbarhetene og til å kunne prioritere dem etter et kost-nytte prinsipp
        Foredraget har en introduksjon til trusselmodellering med et enkelt eksempel. Jeg deler også mine erfaringer med trusselmodellering. De dårlige fra et stort selskap hvis-navn-ikke-nevnes, og de gode, nybakte vi nå bruker i Oslo kommune.
        Jeg vil også reflektere over hvordan trusselmodellering kan tas aktivt i bruk fra et endringsledelsesperspektiv (ADKAR): forstå hvorfor dette er nødvendig, ha vilje og motivasjon til å delta, vite hvordan og hva som skal til for endres, å kunne gjennomføre endringen i praksis, og ikke minst: sørge for at trusselmodellering er aktivitet som gjennomføres jevnlig.
  - time: '13:30'
    event: Pause
  - time: 13:40–14:10
    duration: 30 min
    talks:
    - org: FFI
      title: Så enkelt er det å bli kvantesikker
      speaker: Martin Strand
      description: |-
        NSM har for lengst utgitt en veileder for å migrere til kvantesikker kryptografi, og løsningene er i stor grad klare. Mye av migreringen går nesten av seg selv -- rundt 60 % av internettrafikken er allerede kvantesikker -- og noe krever aktiv innsats.

        Jeg vil forsøke å vise at det for det meste kan gjøres veldig enkelt og billig, og deretter utruste forsamlingen med litt argumenter de kan bruke når sjefen har fått et dyrt og vanskelig tilbud fra noen som vil selge løsninger basert på kvantefysikk.
  - time: '14:10'
    event: Pause
  - time: 14:20–14:50
    duration: 30 min
    talks:
    - org: MET
      title: Gitlab-runner med KubeVirt
      speaker: Christian Skarby
      description: Praktisk demo med oppsett av kubevirt og gitlab-runner for å kjøre CI/CD i bruk-og-kast-VMer.
  - time: '14:50'
    event: Pause
  - time: 15:00–15:30
    duration: 30 min
    talks:
    - org: Digdir
      title: Understanding APT defence thru Experts Eyes
      speaker: A critical exploration of Perceived Needs and Gaps - Raymond Andre Hagen
      description: |-
        Gjennom forskning på forsvar mot avanserte trusselaktører har jeg publisert en del funn på gapet mellom hva som eksperter trur de har behov for , og hva som de burde fokusert på. Del av offentlig PHD arbeid ved NTNU , og mitt arbeid som fagdirektør i Cybersikkerhet ved Digitaliseringsdirektoratet.
  - time: '15:30'
    event: Pause
  - time: 15:50–16:00
    duration: 10 min
    talks:
    - org: Oslo kommune
      track: Lyntale
      title: Sikkerhet startar med klarspråk
      speaker: Håvard Eide
      description: |-
        Språk er ein fundamental del av korleis vi kommuniserar og tolkar når vi utviklar programvare: korleis formar det hensikt, antagelsar, risiko og sikkerhets implikasjonar?

        Ein kikk på korleis vi som utviklarar bør bruke klarspråk for å kommunisere gjennom utviklings-syklusen: fra kravspesifikasjon til produksjon og når ting går galt. Korleis vi brukar språk kan forme konsekvensane av kva som skjer når ting ikkje skjer etter planen.
  - time: 16:00–16:10
    duration: 10 min
    talks:
    - org: Politiet
      track: Lyntale
      title: Oops, sletta 75TB med prod-data. Hva nå?
      speaker: Christian Tryti
      description: |-
        Først vise hvor enkelt det er å slette 75TB fra en S3-bucket, så hvordan det ble håndtert i form av varsling til brukere og Post-Incident-Review (aka Post mortem, men det får ikke vi i Politiet lov til å kalle det)
  - time: 16:10–16:20
    duration: 10 min
    talks:
    - org: NAV
      track: Lyntale
      title: AppSec i Nav med TPT
      speaker: Emil Albrektsson
      description: |-
        Prioritering av sårbarheter er vanskelig og det er ikke uvanlig att utviklere ender opp med "alert fatigue". I Nav prøver vi å løse dette med TittPåTing, et egenutviklet verktøy som hjelper utviklere å prioritere hvilke sårbarheter som bør oppdateres først.

        Open-source, selv-følgelig!
  - time: '16:20'
    event: Pause
  - time: 16:30–17:00
    duration: 30 min
    talks:
    - org: NAV
      title: 'Magic: The Gathering er turingkomplett'
      speaker: Andreas Nordahl
      description: |-
        Magic er kjent for å være et litt over gjennomsnittet komplisert spill, men visste du at spillet kan modellere en generell datamaskin? I dette foredraget besvarer jeg tre grunnleggende spørsmål som du ikke visste du hadde: (1) Hva er MTG? (2) Hva vil det si å være turingkomplett? (3) Hvordan kan MTG simulere en vilkårlig turingmaskin?
- name: Rom 3, M5
  subtitle: Metode, Produkt & Data
  id: rom3
  schedule:
  - time: 09:00–09:10
    duration: 10 min
    talks:
    - org: Offentlig Fagdag
      title: Velkomsttale i Meet-salen
      speaker: Arrangørene av Offentlig Fagdag
      description: Arrangørene ønsker velkommen til fagdagen og gir en kort introduksjon til dagens program.
  - time: 09:10
    event: Pause
  - time: 09:20–09:50
    duration: 30 min
    talks:
    - org: Politiet
      title: Produktmodne team bygges
      speaker: de oppstår ikke av seg selv - Gunn-Elin Åsgren og Ove Dalen
      description: |-
        Fra ambisjon til praksis: En modningsreise for produktteam.
        De fleste team i offentlig sektor ønsker å jobbe mer produktorientert. Færre vet hva det faktisk krever i hverdagen. I dette foredraget viser vi hvordan vårt eget produkt Teamskolen og vårt egenutviklede verktøy "Teamsirkelen" hjelper team å forstå hvor de er, hva som holder dem igjen – og hvordan de kan ta neste steg i sin produktmodning. Dette gjør vi som ledd i en større strategi og å jobbe med å produktrette hele vår organisasjon, for å møte de store utfordringene Politiet står ovenfor. Vi må både få fart på teknologien vår, samtidig som alle vi som jobber der, må bli enda bedre til å lære sammen og omsette læring til verdi raskt.
        I foredraget vil fag- og personalleder for design Ove Dalen og produktprinsipal Gunn-Elin Åsgren gi dere få innsyn et verktøy vi har utviklet, erfaringene så langt fra ca 50 team, fallgruver og hypoteser om veien videre for oss.
  - time: 09:50
    event: Pause
  - time: 10:00–10:30
    duration: 30 min
    talks:
    - org: Digdir,Brønnøysundregistrene
      title: Fra applikasjonssentrisk til datasentrisk tjenesteutvikling – revolusjon eller evolusjon?
      speaker: Erik Hagen og Audun Vindenes Egge
      description: "Offentlig sektor har i flere tiår anskaffet applikasjoner og fagsystemer på leverandørenes premisser. Informasjonsmodeller og data har fulgt systemene – ikke omvendt. Resultatet er et fragmentert systemlandskap med innelåste data, begrenset gjenbruk, kostnadskrevende integrasjon og manglende evne til å skape sammenhengende tjenester på tvers. \n \nProsjektet Sammenhengende tjenester for barn og unge (SAMT-BU) tar utgangspunkt i at dette ikke lenger er bærekraftig. Ambisjonen er å drive fram et nødvendig systemskifte mot datasentrisk tjenesteutvikling, med pilotering innenfor barn og unge. Felles informasjonsmodeller og standardiserte grensesnitt etableres som grunnmur for samhandling og sammenhengende tjenester med brukeren i sentrum. \n \nEt slikt skifte forutsetter endringer i hvordan vi kravstiller, bestiller og utvikler IT-løsninger. Dette er et komplekst og langsiktig arbeid som krever bred teknologisk og arkitekturfaglig medvirkning. SAMT-BU-prosjektet er i oppstart. Vi har ikke alle svarene, og må arbeide smidig og lærende. I foredraget forteller vi hvor vi er - og hvordan vi ser for oss at vi kan ta det videre i fellesskap."
  - time: '10:30'
    event: Pause
  - time: 10:40–11:10
    duration: 30 min
    talks:
    - org: SPK
      title: Fra Start-Up til Stat-Up – innovasjon fra innsiden av staten
      speaker: Jørgen Ekvoll
      description: |-
        Etter ti år som gründer tok jeg steget rett inn i staten i 2022 – som teamleder for et produktteam i Statens pensjonskasse (SPK). Overgangen var større enn jeg hadde sett for meg. Ikke bare kulturelt, men også metodisk.

        I dette foredraget deler jeg konkrete erfaringer fra å ta med start-up-tankesett inn i offentlig sektor:

        Hva fungerer faktisk når man skal bygge høyleveranse-team i staten?

        Hvordan jobber man med innovasjon fra innsiden av en stor organisasjon?

        Hva kan offentlig sektor lære av gründere – og hva bør man ikke kopiere ukritisk?

        Med praktiske eksempler viser jeg hvordan vi har jobbet med produktutvikling, teamstruktur og eierskap for å skape fart og kvalitet – uten å falle i klassiske “smidig-feller”.

        Jeg har tidligere holdt foredrag for blant annet Cisco (2025), hvor jeg presenterte en “anti-scrum”-tilnærming til produktutvikling i norsk kontekst. Dette foredraget bygger videre på de samme prinsippene, tilpasset virkeligheten i offentlig sektor.

        Målet er å gi deltakerne konkrete perspektiver de kan ta med seg tilbake til egne team – enten de jobber med digitalisering, tjenesteutvikling eller organisasjonsendring.
  - time: '11:10'
    event: Pause
  - time: 11:20–11:50
    duration: 30 min
    talks:
    - org: Politiet
      title: Ingen pauseknapp i politiet. Slik erstattet vi en kritisk løsning uten å miste kontrollen
      speaker: Kim Olsen Vindsland
      description: |-
        Politiet planlegger hver dag beredskap med mennesker, kjøretøy, hunder helikoptre, utstyr og kompetanse som må være sikkert,  raskt og presist.Likevel måtte vi bytte fundamentet for planleggingen, midt i kjernen av politinorges beredsskapssentrum, hos patruljene og i operasjonsentralen.

        Hva kreves det av teamet, poltitets brukere og meg som produktleder, når både måloppnåelse, brukernes arbeidshverdag og samfunnsoppdraget står på spill? Og hva betyr det for oss som borgere at politiet kan jobbe med teknologiutvikling på denne måten?

        Tre faktorer gjorde det mulig:Tillit. Mot. Og fart.
  - time: '11:50'
    event: Lunsj
  - time: 13:00–13:30
    duration: 30 min
    talks:
    - org: Skatteetaten
      title: Tenor testdatasøk
      speaker: Linda Granstad
      description: "Tenor testdatasøk er et arbeidsverktøy for alle som driver systemutvikling og som trenger testdata. Løsningen gir deg enkel tilgang til syntetiske testdata fra Test-Norge, med testdata fra flere ulike kilder. Tenor ble som idé født i det som den gang het Tverretatlig samarbeid (nå Test-Norge samarbeidet). Tanken var å gjøre det enklere å utveksle syntetiske testdata på tvers i det offentlige. Allerede som ettåring vant løsningen en pris fra Datatilsynet for innebygd personvern. \n\nVi gir deg en innføring i hva Tenor testdatasøk er, hva tanken bak har vært, hva du kan bruke den til, og ikke minst får du vite hvordan et samarbeid i det offentlige kan være en solskinnshistorie som gir fantastiske resultater! \n\nhttps://www.datatilsynet.no/aktuelt/aktuelle-nyheter-2022/pris-til-test-norge-og-tenor-testdatasok/\n\nhttps://www.skatteetaten.no/testdata/"
  - time: '13:30'
    event: Pause
  - time: 13:40–14:10
    duration: 30 min
    talks:
    - org: Oslo kommune
      title: Tverrfaglig innsikt i produktutvikling fra start til slutt
      speaker: Stian Carstens Bendiksen og Ingvild Sundby
      description: |-
        Fra oppvekstområdet i Digitaliseringsetaten deler vi hvordan vi jobber med tverrfaglig innsiktsarbeid når problemstillingen går på tvers av tjenester,
        og mange har en mening om både årsak og løsning. Foredraget tar deltakerne med inn i et konkret innsiktsløp fra oppvekstdomenet i Oslo kommune.
        
        Målet er ikke “mer kunnskap”, men en tydelig avgrensing: Hvor kan digitale løsninger raskt gi mer verdi for ansatte som har behov for å dele informasjon 
        om sårbare barn og unge i de skolenære tjenestene? 
        
        Vi viser hvordan vi jobber tverrfaglig helt fra start for å unngå både analysefella og byggefella.
        
        Det betyr at vi kombinerer brukerinnsikt (kvantitativ og kvalitativ innsikt) og rammeinnsikt (hva vi må forholde oss til eller endre for å skape verdi).
        
        Foredraget passer for alle som jobber med produktutvikling, enten det er teknologer, produktledere, tjenestedesignere, tek-jurister eller andre interesserte.

  - time: '14:10'
    event: Pause
  - time: 14:20–14:50
    duration: 30 min
    talks:
    - org: Digdir
      title: R.I.P. Scrum
      speaker: Hello Radical Focus - Nina Kylstad og Ronny Birkeli
      description: |-
        Flere stjerner og planeter stod i samme bane, og etter 20 år med Scrum/Kanban og ca. 470 to ukers sprinter følte vi at det var på tide å gjøre noe med ting som funket sånn passe. Team Altinn Studio fra Digdir deler sine første erfaringer fra hvordan det er å gå over til og kjøre etter Radical Focus som metodikk - og noen vurdering er rundt hvor lurt det er å gjøre det mens man holder på med et stort program (hint: migrering fra Altinn 2 til Altinn 3).
  - time: '14:50'
