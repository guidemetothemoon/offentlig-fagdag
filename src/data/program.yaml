      speaker: er det så farlig, da? - Lotte Johansen
      description: |-
        Et ærlig og humoristisk foredrag om livet i team – og alt som skjer når ting endrer seg. Vi snakker om Kubler-Ross, storming-fasen og hvorfor litt friksjon faktisk er et godt tegn. For det er i stormen vi finner kraften til å skape noe nytt.
